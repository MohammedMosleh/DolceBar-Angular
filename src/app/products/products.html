<div class="p-3">
    <h3 class="mb-4">Our Products</h3>

    <div *ngIf="filteredProducts.length === 0" class="alert alert-info">
        No products in this category
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" *ngFor="let product of filteredProducts">
            <div class="card h-100 shadow-sm">
                <img [src]="product.image" class="card-img-top" style="height: 250px; object-fit: cover;"
                    [alt]="product.name">
                <div class="card-body">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text">{{ product.description }}</p>
                </div>
                <div class="card-footer text-center bg-white">
                    <span class="fw-bold d-block mb-2 text-success">Price: {{ product.price }} ₪</span>
                    <a class="btn btn-sm btn-info me-2" [routerLink]="['/product-details', product.name]">Details</a>
                    <button class="btn btn-sm btn-warning" (click)="addToCart(product)">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</div>
