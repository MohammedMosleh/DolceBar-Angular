<div class="card shadow-sm h-100">
    <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Categories</h5>
    </div>
    <div class="list-group list-group-flush">
        <button type="button" class="list-group-item list-group-item-action"
            [class.active]="selectedCategoryId === null" (click)="onCategoryClick(null)">
            All Products
        </button>
        <button type="button" *ngFor="let category of categories" class="list-group-item list-group-item-action"
            [class.active]="selectedCategoryId === category.id" (click)="onCategoryClick(category.id)">
            {{ category.name }}
        </button>
    </div>
</div>
