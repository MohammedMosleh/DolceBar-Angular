<div class="container mt-4">
    <h2 class="cart-title">Shopping Cart</h2>

    <div *ngIf="cartProducts.length === 0" class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <h4>Your cart is empty</h4>
        <p>Add some products from the catalog to get started!</p>
    </div>

    <div *ngIf="cartProducts.length > 0">
        <div class="cart-items">
            <div class="cart-item" *ngFor="let item of cartProducts">
                <div class="cart-item-image">
                    <img [src]="item.product.image" [alt]="item.product.name">
                </div>

                <div class="cart-item-info">
                    <h5 class="cart-item-name">{{ item.product.name }}</h5>
                    <p class="cart-item-price">{{ item.product.price }} ₪</p>
                </div>

                <div class="cart-item-quantity">
                    <button class="btn btn-sm btn-outline-secondary" (click)="reduceQuantity(item)">−</button>
                    <span class="quantity-value">{{ item.quantity }}</span>
                    <button class="btn btn-sm btn-outline-secondary" (click)="addQuantity(item)">+</button>
                </div>

                <div class="cart-item-total">
                    <span>{{ item.product.price * item.quantity }} ₪</span>
                </div>

                <div class="cart-item-delete">
                    <button class="btn btn-sm btn-danger" (click)="removeProduct(item)">Delete</button>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <div class="cart-total">
                <span class="total-label">Total:</span>
                <span class="total-value">{{ cartTotal }} ₪</span>
            </div>

            <div class="cart-actions">
                <button class="btn btn-outline-danger" (click)="clearCart()">Clear Cart</button>

                <button *ngIf="isLoggedIn" class="btn btn-success" (click)="checkout()">Payment</button>

                <p *ngIf="!isLoggedIn" class="login-message">Please login to complete your purchase</p>
            </div>
        </div>
    </div>
</div>
