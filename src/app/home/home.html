<div class="mt-5 p-3">
  <div class="row row-cols-5">
    <div class="col" *ngFor="let product of products">
      <div class="card shadow">
        <img [src]="product.image" height="250px" class="card-img-top" alt="{{product.name}}">
        <div class="card-body">
          <h5 class="card-title">{{product.name}}</h5>
          <p class="card-text">{{product.description}}</p>
        </div>
        <div class="card-footer text-center">
          <span class="fw-bold d-block mb-2">Price: {{product.price}} ₪</span>
          <a class="btn btn-sm btn-info" [routerLink]="['/product-details', product.name]">Details</a>
        </div>
      </div>
    </div>
  </div>
  <div class="row row-cols-3 mt-5 align-items-center justify-content-center">
    <a href="https://www.facebook.com/Dolcebae.epl/" target="_blank" class="col-md-auto btn btn-outline-primary mx-2">
      <i class="bi bi-facebook"></i> Facebook
    </a>
    <a href="https://www.instagram.com/dolcebar.epl/" target="_blank" class="col-md-auto btn btn-outline-danger mx-2">
      <i class="bi bi-instagram"></i> Instagram
    </a>
  </div>
</div>
