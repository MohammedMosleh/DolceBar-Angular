<div class="container mt-5">
  <div *ngIf="product" class="card shadow-lg p-4">
    <div class="row">
      <div class="col-md-4 text-center">
        <img [src]="product.image" alt="{{ product.name }}" class="img-fluid rounded" style="max-height: 250px; object-fit: cover;">
      </div>
      <div class="col-md-8">
        <h2 class="card-title text-primary">{{ product.name }} Details</h2>
        <hr>
        <p class="card-text lead">{{ product.description }}</p>

        <h4 class="mt-4 text-info">Details </h4>
        <p class="fw-bold">{{ product.technicalDetails }}</p>
        <p class="fw-bold text-success">Price: {{ product.price }} ₪</p>
      </div>
    </div>
    <div class="card-footer text-end mt-4">
      <button (click)="goBack()" class="btn btn-outline-secondary">
Go Back
      </button>
    </div>
  </div>
  <div *ngIf="!product" class="alert alert-danger mt-4">
    Product not found.
  </div>
</div>
